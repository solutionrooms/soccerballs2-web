<!DOCTYPE html>
<html lang="en">
<head>

	<meta charset="utf-8">

	<title>Soccer Balls 2</title>

	<meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />

	<!-- GameDistribution HTML5 SDK — release build only (-Dgdsdk, set by `npm run replica:release`). Loaded once,
	     before the game starts. GD_OPTIONS.onEvent bridges ad start/stop to the game: SDK_GAME_PAUSE →
	     window.sb2GdPause (freeze + mute), SDK_GAME_START → window.sb2GdResume (resume + restore audio). -->
	<script>
		window["GD_OPTIONS"] = {
			"gameId": "8339bd11fe664f56a33f81c0c8d04ca7",
			"onEvent": function (event) {
				switch (event.name) {
					case "SDK_GAME_START":
						if (window.sb2GdResume) { window.sb2GdResume(); }
						break;
					case "SDK_GAME_PAUSE":
						if (window.sb2GdPause) { window.sb2GdPause(); }
						break;
					case "SDK_GDPR_TRACKING": break;
					case "SDK_GDPR_TARGETING": break;
					case "SDK_REWARDED_WATCH_COMPLETE": break;
				}
			}
		};
		(function (d, s, id) {
			var js, fjs = d.getElementsByTagName(s)[0];
			if (d.getElementById(id)) { return; }
			js = d.createElement(s); js.id = id;
			js.src = "https://html5.api.gamedistribution.com/main.min.js";
			fjs.parentNode.insertBefore(js, fjs);
		}(document, "script", "gamedistribution-jssdk"));
	</script>

	
	<link rel="shortcut icon" type="image/png" href="./favicon.png">

	
	<!-- bit-exact original-Nape replica (bundled from src/physics/replica); only the -D replica build loads + uses it. SET_REPLICA is lime's template flag for the command-line `-Dreplica` define. -->
	<script type="text/javascript" src="./nape-replica.js"></script>
	<script type="text/javascript" src="./SoccerBalls2.js"></script>

	<script>
		// Block the iOS rubber-band / page scroll so the canvas owns all touch gestures.
		window.addEventListener ("touchmove", function (event) { event.preventDefault (); }, { capture: false, passive: false });
	</script>

	<style>
		html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000000; }
		/* Pin the game container to the WHOLE visual viewport so lime letterbox-scales the 700x525 stage
		   UP to fill it. The default lime shell fixed this box at 700x525px, which left the canvas at
		   ~native size with big black margins in landscape. */
		#openfl-content {
			position: fixed; top: 0; left: 0; right: 0; bottom: 0;
			width: 100%; height: 100%;
			background: #000000;
			overflow: hidden;
		}
		#openfl-content canvas { display: block; }

		@font-face {
			font-family: 'Komika Axis';
			src: url('assets/fonts/KomikaAxis.ttf') format('truetype');
			font-weight: normal; font-style: normal;
		}
		@font-face {
			font-family: 'Komika Axis';
			src: url('assets/fonts/KomikaAxis.eot?#iefix') format('embedded-opentype'),
			url('assets/fonts/KomikaAxis.woff') format('woff'),
			url('assets/fonts/KomikaAxis.ttf') format('truetype'),
			url('assets/fonts/KomikaAxis.svg#Komika%20Axis') format('svg');
			font-weight: normal;
			font-style: normal;
		}

	</style>

</head>
<body>
	<noscript>This webpage makes extensive use of JavaScript. Please enable JavaScript in your web browser to view this page.</noscript>

	
	<span style="font-family: assets/fonts/KomikaAxis.ttf"> </span>
	<span style="font-family: assets/fonts/KomikaAxis.ttf"> </span>

	<div id="openfl-content"></div>

	<script type="text/javascript">
		lime.embed ("SoccerBalls2", "openfl-content", 700, 525, { parameters: {} });

		// Belt-and-braces: make lime re-measure the (now full-viewport) container after layout settles and
		// on every orientation/resize, so the canvas always scales to fill rather than sitting at native
		// size with letterbox margins on first paint.
		(function () {
			function refit () { try { window.dispatchEvent (new Event ("resize")); } catch (e) {} }
			window.addEventListener ("orientationchange", function () { refit (); setTimeout (refit, 250); });
			window.addEventListener ("load", function () { refit (); setTimeout (refit, 100); setTimeout (refit, 500); });
			if (window.visualViewport) window.visualViewport.addEventListener ("resize", refit);
		})();
	</script>

</body>
</html>
