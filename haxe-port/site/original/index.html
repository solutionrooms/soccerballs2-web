<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Soccer Balls 2 — ORIGINAL (Kongregate release, Ruffle reference)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
 html,body{margin:0;background:#1b1b1b;color:#ddd;font-family:system-ui,sans-serif}
 #wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px}
 #player{width:700px;height:525px;max-width:100vw;background:#000;box-shadow:0 0 20px #000}
 .bar{font-size:13px;text-align:center;max-width:700px}
 #status{font-size:12px;color:#999;min-height:16px}
 a{color:#6cf}
</style>
</head>
<body>
<div id="wrap">
 <div class="bar">
   <b>Original Soccer Balls 2</b> &mdash; the genuine <b>Kongregate release</b> SWF (all levels unlocked),
   run via Ruffle, for reference/comparison against the port. This is the developers' own game; hosted here as a dev reference.
 </div>
 <div id="player"></div>
 <div id="status">loading Ruffle&hellip;</div>
</div>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<script>
 var st = document.getElementById("status");
 window.RufflePlayer = window.RufflePlayer || {};
 window.addEventListener("DOMContentLoaded", function () {
   if (!window.RufflePlayer || !window.RufflePlayer.newest) {
     st.textContent = "Ruffle failed to load from CDN."; return;
   }
   var ruffle = window.RufflePlayer.newest();
   var player = ruffle.createPlayer();
   var c = document.getElementById("player");
   c.appendChild(player);
   player.style.width = "700px"; player.style.height = "525px";
   st.textContent = "booting original (Kongregate release) …";
   player.load({ url: "SoccerBalls2_Kong.swf", autoplay: "on", letterbox: "on", logLevel: "info" })
     .then(function(){ st.textContent = "running — Kongregate release (traces -> console)"; })
     .catch(function(e){ st.textContent = "load error: " + e; });
 });
</script>
</body>
</html>
